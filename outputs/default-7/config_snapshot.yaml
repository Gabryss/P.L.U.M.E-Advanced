name: default
seed: 7
domain:
  grid_shape:
  - 24
  - 40
  - 40
  voxel_size: 1.0
geology:
  interface_undulation: 1.8
  fracture_strength: 0.65
  fracture_wavelengths:
  - 0.11
  - 0.19
  - 0.27
  layers:
  - name: caprock
    thickness: 0.22
    hardness: 1.3
    solubility: 0.08
    permeability: 0.03
    base_porosity: 0.02
  - name: limestone
    thickness: 0.48
    hardness: 0.82
    solubility: 0.92
    permeability: 0.08
    base_porosity: 0.08
  - name: marl
    thickness: 0.3
    hardness: 0.95
    solubility: 0.38
    permeability: 0.05
    base_porosity: 0.05
hydro:
  source_face: top
  sink_face: right
  recharge_head: 1.0
  drainage_head: 0.0
  solver_iterations: 40
dissolution:
  iterations: 80
  dt: 0.4
  porosity_gain: 0.4
  solid_loss: 0.6
  permeability_fracture_gain: 1.1
  permeability_porosity_gain: 6.0
  fracture_amplification: 1.2
  exposure_gain: 0.5
  undersaturation: 1.0
  void_threshold: 0.4
monitoring:
  progress_bar_enabled: true
  log_interval: 5
  plot_interval: 20
  slice_interval: 20
  mesh_preview_interval: 80
  histogram_interval: 30
dataset:
  output_dir: outputs
  sample_count: 1
